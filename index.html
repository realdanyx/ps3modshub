<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LunarPS3</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    color: #00ffcc;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #000, #0a0a0a, #001a1a, #000);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* PARTICLES */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* HEADER */
.header-img {
    display: block;
    margin: 25px auto 10px;
    width: 320px;
    height: 176px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px #00ffcc;
}

h1 {
    text-align: center;
    margin-bottom: 15px;
}

/* GRID */
.mods {
    padding: 15px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(0,0,0,0.6);
    border-radius: 18px;
    padding: 15px;
    border: 1px solid rgba(0,255,204,0.2);
    box-shadow: 0 0 10px rgba(0,255,204,0.2);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 20px #00ffcc;
}

.mod-img {
    width: 100%;
    height: 176px;
    object-fit: cover;
    border-radius: 12px;
}

.card h2 {
    margin: 10px 0 5px;
    font-size: 18px;
}

.card p {
    font-size: 13px;
    opacity: 0.8;
}

/* BUTTON */
.download {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 20px;
    font-size: 13px;
    opacity: 0.7;
    border-top: 1px solid rgba(0,255,204,0.2);
}

.footer span {
    color: #00ffcc;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>


<h1>Available mods: </h1>

<div class="mods">

    <div class="card">
        <img class="mod-img" src="mod1.png">
        <h2>LunarClient for PS3 [1.13]-[w/DB]</h2>
        <p>About:
           Region: NPUB31419.</p>
        <a class="download" href="https://www.mediafire.com/file/o6t8bqj3hgfy0ga/LunarClient-PS3.pkg/file" target="_blank">Descargar</a>
</div>
<div class="card">
    <img class="mod-img" src="mod2.png">
    <h2>Enhanced Client</h2>
    <p>Made by RealDanyx
    Minecraft Remake </p>
    <a class="download" href="https://www.mediafire.com/file/65x6ctr68ucqh95/EnhancedClient-ByRealDanyx.pkg/file" target="_blank">Descargar</a>
</div>

</div>

<!-- .... -->
<div class="footer">
    <p>About</p>
    <p>Hosting with GitHubPages<span>.</span></p>
    <p>Discord: @RealDanyx</p>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

let particles = [];
const total = 50; // optimizado

for (let i = 0; i < total; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedY: Math.random() * 0.7 + 0.2
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ffcc";

    for (let p of particles) {
        p.y += p.speedY;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }

    requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", resize);
</script>

</body>
</html>
