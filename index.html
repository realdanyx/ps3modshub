<style>
body {
    margin: 0;
    font-family: monospace;
    color: #00ffcc;
    overflow-x: hidden;
    
    /* GRADIENT ANIMADO */
    background: linear-gradient(-45deg, #000000, #0a0a0a, #001a1a, #000000);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
}

/* ANIMACIÓN FONDO */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* PARTÍCULAS */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    top: 0;
    left: 0;
}

/* TODO LO DEMÁS IGUAL PERO MEJORADO */
#loginScreen {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#loginBox {
    border: 1px solid #00ffcc;
    padding: 30px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px #00ffcc;
    backdrop-filter: blur(5px);
}

input {
    width: 90%;
    margin: 10px 0;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

button {
    padding: 10px 20px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#mainContent {
    display: none;
    padding: 20px;
}

.header-img {
    display: block;
    margin: 0 auto 20px auto;
    width: 320px;
    height: 176px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 20px #00ffcc;
}

.mods {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    border: 1px solid #00ffcc;
    padding: 15px;
    border-radius: 15px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    transition: 0.3s;
    box-shadow: 0 0 10px #00ffcc;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ffcc;
}

.mod-img {
    width: 100%;
    height: 176px;
    object-fit: cover;
    border-radius: 15px;
}

.download {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #00ffcc;
    color: black;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
}
</style>
